# Path to the corpus folder (sell-side PDFs).
# Prefer env FIND_RPT_CORPUS so machine-specific paths stay out of git.
# If empty, defaults to ./corpus under the repo root.
# PDFs are confidential — keep local; do not commit them.
corpus_path: ""

# Where the searchable index, audit JSON, and citation highlights are stored
# (gitignored). After changing extractors, refresh metrics with:
#   python scripts/audit_full_corpus.py
#
# Latest quality (N=172): company/passages 100%; EPS/email/consensus 100% conditional;
# TP 98.3%; rating 95.5%; revisions 94.5%. See scripts/README.md.
cache_dir: ".find-rpt"
